services:
  acestep-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/sam-dumont/ace-step-1.5-turbo:latest
    container_name: acestep-api
    ports:
      - "8000:8000"
    volumes:
      - outputs:/app/outputs
    environment:
      - ACESTEP_DEVICE=cuda
      - ACESTEP_LM_BACKEND=pt
      - ACESTEP_API_HOST=0.0.0.0
      - ACESTEP_API_PORT=8000
      - ACESTEP_OUTPUT_DIR=/app/outputs
      # Uncomment for 8GB VRAM GPUs (T1000, GTX 1070, etc.)
      # - MAX_CUDA_VRAM=20
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

volumes:
  outputs:
