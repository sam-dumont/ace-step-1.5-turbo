name: Build and push Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

# PRs from forks cannot trigger this workflow (no pull_request trigger).
# Only pushes to main and manual dispatch are allowed.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - lm_model_size: "0.6B"
            dit_variant: "base"
            tag_suffix: "0.6b"
          - lm_model_size: "0.6B"
            dit_variant: "turbo"
            tag_suffix: "0.6b-turbo"
          - lm_model_size: "1.7B"
            dit_variant: "base"
            tag_suffix: "1.7b"
          - lm_model_size: "1.7B"
            dit_variant: "turbo"
            tag_suffix: "1.7b-turbo"
      fail-fast: false

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            LM_MODEL_SIZE=${{ matrix.lm_model_size }}
            DIT_VARIANT=${{ matrix.dit_variant }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.tag_suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.tag_suffix }}
          secrets: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.tag_suffix }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.tag_suffix }},mode=max
